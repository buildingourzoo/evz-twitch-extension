<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>EVZ Video Component</title>

  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: Arial, sans-serif;
      color: white;
    }

    .card {
      position: absolute;
      bottom: 5%;
      left: 5%;
      width: 320px;
      padding: 14px;
      background: rgba(0,0,0,0.75);
      border-radius: 12px;
    }

    .name {
      font-size: 20px;
      font-weight: bold;
    }

    .species {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="name">Tango</div>
    <div class="species">Red Panda</div>
    <div style="margin-top:10px;font-size:12px;">
      EVZ Animal Ambassador
    </div>
  </div>

</body>
</html>
