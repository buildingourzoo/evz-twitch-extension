<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>EVZ Animals Panel</title>

  <meta http-equiv="Content-Security-Policy" content="frame-ancestors https://*.twitch.tv https://twitch.tv">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      width: 300px;
      height: 300px;
      overflow: hidden;
    }

    .wrapper {
      padding: 8px;
      box-sizing: border-box;
      height: 100%;
    }

    .menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    button {
      padding: 6px;
      background: #222;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-size: 11px;
      transition: 0.2s;
    }

    button img {
      width: 100%;
      border-radius: 4px;
      margin-bottom: 4px;
    }

    button:hover {
      background: #333;
      transform: scale(1.03);
    }

    .lightbox {
      position: absolute;
      top: 0;
      left: 0;
      width: 300px;
      height: 300px;
      background: rgba(0,0,0,0.7);

      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: auto;
    }

    .card {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;

      background: rgba(0,0,0,0.95);
      border-radius: 10px;
      overflow-y: auto;

      transform: scale(0.9);
      transition: transform 0.25s ease;
    }

    .lightbox.active .card {
      transform: scale(1);
    }

    .profile-img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      transition: transform 0.25s ease;
    }

    .close-btn {
      position: absolute;
      top: 6px;
      right: 10px;
      font-size: 14px;
      cursor: pointer;
      z-index: 2;
    }

    .content {
      padding: 8px;
    }

    .name {
      font-size: 16px;
      font-weight: bold;
    }

    .species {
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 6px;
    }

    .label {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 6px;
    }

    .text {
      font-size: 11px;
      line-height: 1.2;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="menu">
    <button onclick="showAnimal('tango', 'assets/red pandas/Tango-profile.jpg')"><img src="assets/red pandas/Tango-profile.jpg">Tango</button>
    <button onclick="showAnimal('kiki', 'assets/red pandas/Kiki-profile.jpg')"><img src="assets/red pandas/Kiki-profile.jpg">Kiki</button>
    <button onclick="showAnimal('fred', 'assets/red pandas/Fred-profile.jpg')"><img src="assets/red pandas/Fred-profile.jpg">Fred</button>
    <button onclick="showAnimal('george', 'assets/red pandas/George-profile.jpg')"><img src="assets/red pandas/George-profile.jpg">George</button>
    <button onclick="showAnimal('hula', 'assets/seals/Hula-profile.jpg')"><img src="assets/seals/Hula-profile.jpg">Hula</button>
    <button onclick="showAnimal('sushi', 'assets/seals/Sushi-profile.jpg')"><img src="assets/seals/Sushi-profile.jpg">Sushi</button>
    <button onclick="showAnimal('wasabi', 'assets/seals/Wasabi-profile.jpg')"><img src="assets/seals/Wasabi-profile.jpg">Wasabi</button>
    <button onclick="showAnimal('sophia', 'assets/seals/Sophia-profile.jpg')"><img src="assets/seals/Sophia-profile.jpg">Sophia</button>
    <button onclick="showAnimal('mischa', 'assets/seals/Mischa-profile.jpg')"><img src="assets/seals/Mischa-profile.jpg">Mischa</button>
    <button onclick="showAnimal('isadora', 'assets/seals/Isadora-profile.jpg')"><img src="assets/seals/Isadora-profile.jpg">Isadora</button>
    <button onclick="showAnimal('nika', 'assets/seals/Nika-profile.jpg')"><img src="assets/seals/Nika-profile.jpg">Nika</button>
  </div>

</div>

<!-- PROFILE VIEW -->
<div class="lightbox" id="lightbox" onclick="hideCard()">

  <div class="card" onclick="event.stopPropagation()">

    <div class="close-btn" onclick="hideCard()">✕</div>

    <img id="profileImage" class="profile-img">

    <div class="content">
      <div class="name" id="name"></div>
      <div class="species" id="species"></div>

      <div class="label">Sex</div>
      <div class="text" id="sex"></div>

      <div class="label">Age</div>
      <div class="text" id="age"></div>

      <div class="label">Birthday</div>
      <div class="text" id="birthday"></div>

      <div class="label">Arrived</div>
      <div class="text" id="arrived"></div>

      <div class="label">About</div>
      <div class="text" id="about"></div>

      <div class="label">Identifiers</div>
      <div class="text" id="identifiers"></div>

      <div class="label">IUCN Status</div>
      <div class="text" id="status"></div>

      <div class="label">Conservation</div>
      <div class="text" id="conservation"></div>
    </div>

  </div>
</div>

<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
<script src="js/twitch.js"></script>
<script src="js/panel.js"></script>

<script>
function showAnimal(key, imgPath) {
  const a = animals[key];

  document.getElementById("name").innerText = a.name;
  document.getElementById("species").innerText = a.species;
  document.getElementById("sex").innerText = a.sex;
  document.getElementById("age").innerText = a.age;
  document.getElementById("birthday").innerText = a.birthday;
  document.getElementById("arrived").innerText = a.arrived;
  document.getElementById("about").innerText = a.about;
  document.getElementById("identifiers").innerText = a.identifiers;
  document.getElementById("status").innerText = a.status;
  document.getElementById("conservation").innerText = a.conservation;

  document.getElementById("profileImage").src = imgPath;

  document.getElementById("lightbox").classList.add("active");
}

function hideCard() {
  document.getElementById("lightbox").classList.remove("active");
}
</script>

</body>
</html>
