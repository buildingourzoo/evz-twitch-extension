<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>EVZ Animals Panel</title>

  <meta http-equiv="Content-Security-Policy" content="frame-ancestors https://*.twitch.tv https://twitch.tv">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      width: 300px;
      height: 300px;
      overflow: hidden;
    }

    .wrapper {
      padding: 6px;
      box-sizing: border-box;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      height: 20px;
    }

    .twitch-btn {
      font-size: 10px;
      padding: 3px 6px;
      background: #6441a5;
      border-radius: 4px;
      text-decoration: none;
      color: white;
    }

    .filters {
      display: flex;
      gap: 4px;
    }

    .filters button {
      flex: 1;
      font-size: 10px;
      padding: 4px;
      background: #333;
      border-radius: 4px;
    }

    .filters button.active {
      background: #555;
    }

    .menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      overflow-y: auto;
      flex: 1;
    }

    button {
      padding: 6px;
      background: #222;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-size: 11px;
    }

    button img {
      width: 100%;
      border-radius: 4px;
      margin-bottom: 4px;
    }

    button:hover {
      background: #333;
    }

    .lightbox {
      position: absolute;
      top: 0;
      left: 0;
      width: 300px;
      height: 300px;
      background: rgba(0,0,0,0.8);

      display: flex;
      justify-content: center;
      align-items: center;

      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: auto;
    }

    .card {
      width: 92%;
      height: 92%;
      background: #000;
      border-radius: 10px;
      overflow-y: auto;
      position: relative;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      background: #000;
      padding: 6px;
      z-index: 2;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-btn {
      cursor: pointer;
      font-size: 14px;
    }

    .profile-img {
      width: 100%;
      max-height: 140px;
      object-fit: contain;
      background: #000;
    }

    .content {
      padding: 8px;
    }

    .name {
      font-size: 14px;
      font-weight: bold;
    }

    .species {
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 4px;
    }

    .label {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 4px;
    }

    .text {
      font-size: 11px;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="topbar">
    <img src="assets/logos/VZDS/VZDS-Vertical-Logo-White.png" class="logo">
    <a href="https://www.twitch.tv/streamingourzoo" target="_blank" class="twitch-btn">Watch</a>
  </div>

  <div class="filters">
    <button class="active" onclick="filterAnimals('all', this)">All</button>
    <button onclick="filterAnimals('redpanda', this)">Red Pandas</button>
    <button onclick="filterAnimals('seal', this)">Seals</button>
  </div>

  <div class="menu" id="menu">

    <!-- (same buttons as before, unchanged) -->

  </div>

</div>

<div class="lightbox" id="lightbox" onclick="hideCard()">

  <div class="card" onclick="event.stopPropagation()">

    <!-- STICKY HEADER -->
    <div class="sticky-header">
      <div id="name"></div>
      <div class="close-btn" onclick="hideCard()">✕</div>
    </div>

    <img id="profileImage" class="profile-img">

    <div class="content">
      <div id="species" class="species"></div>

      <div class="label">About</div>
      <div id="about" class="text"></div>

      <div class="label">Identifiers</div>
      <div id="identifiers" class="text"></div>
    </div>

  </div>
</div>

<script>
let scrollPosition = 0;

function showAnimal(key, imgPath) {
  scrollPosition = document.getElementById("menu").scrollTop;

  const a = animals[key];

  document.getElementById("name").innerText = a.name;
  document.getElementById("species").innerText = a.species;
  document.getElementById("about").innerText = a.about;
  document.getElementById("identifiers").innerText = a.identifiers;

  document.getElementById("profileImage").src = imgPath;

  document.getElementById("lightbox").classList.add("active");
}

function hideCard() {
  document.getElementById("lightbox").classList.remove("active");

  setTimeout(() => {
    document.getElementById("menu").scrollTop = scrollPosition;
  }, 50);
}

function filterAnimals(type, btn) {
  const buttons = document.querySelectorAll('.filters button');
  buttons.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const items = document.querySelectorAll('.menu button');

  items.forEach(item => {
    if (type === 'all') {
      item.style.display = 'block';
    } else {
      item.style.display = item.dataset.type === type ? 'block' : 'none';
    }
  });
}
</script>

</body>
</html>
