<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>EVZ Animals Panel</title>

  <meta http-equiv="Content-Security-Policy" content="frame-ancestors https://*.twitch.tv https://twitch.tv">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      width: 300px;
      height: 300px;
      overflow: hidden;
    }

    .wrapper {
      padding: 8px;
      box-sizing: border-box;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .menu {
      display: flex;
      gap: 4px;
    }

    button {
      flex: 1;
      padding: 6px;
      background: #222;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-size: 11px;
    }

    button:hover {
      background: #333;
    }

    .card {
      flex: 1;
      background: rgba(0,0,0,0.78);
      border-radius: 10px;
      padding: 8px;
      overflow-y: auto;
    }

    .name {
      font-size: 16px;
      font-weight: bold;
    }

    .species {
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 6px;
    }

    .label {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 6px;
    }

    .text {
      font-size: 11px;
      line-height: 1.2;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="menu">
    <button onclick="showAnimal('tango')">Tango</button>
    <button onclick="showAnimal('kiki')">Kiki</button>
  </div>

  <div class="card">
    <div class="name" id="name">Tango</div>
    <div class="species" id="species">Red Panda</div>

    <div class="label">Sex</div>
    <div class="text" id="sex"></div>

    <div class="label">Age</div>
    <div class="text" id="age"></div>

    <div class="label">Birthday</div>
    <div class="text" id="birthday"></div>

    <div class="label">Arrived</div>
    <div class="text" id="arrived"></div>

    <div class="label">About</div>
    <div class="text" id="about"></div>

    <div class="label">Identifiers</div>
    <div class="text" id="identifiers"></div>

    <div class="label">IUCN Status</div>
    <div class="text" id="status"></div>

    <div class="label">Conservation</div>
    <div class="text" id="conservation"></div>
  </div>

</div>

<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
<script src="js/twitch.js"></script>
<script src="js/panel.js"></script>
  

</body>
</html>
