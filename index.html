<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>EVZ Animals Panel</title>

  <meta http-equiv="Content-Security-Policy" content="frame-ancestors https://*.twitch.tv https://twitch.tv">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      width: 300px;
      height: 300px;
      overflow: hidden;
    }

    .wrapper {
      padding: 6px;
      box-sizing: border-box;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 4px;
    }

    .filters button {
      flex: 1;
      font-size: 10px;
      padding: 4px;
      background: #333;
      border-radius: 4px;
      border: none;
      color: white;
      cursor: pointer;
    }

    .filters button.active {
      background: #555;
    }

    /* GRID */
    .menu {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      overflow-y: auto;
      flex: 1;
    }

    .animal-btn {
      padding: 6px;
      background: #222;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-size: 11px;
    }

    .animal-btn img {
      width: 100%;
      border-radius: 4px;
      margin-bottom: 4px;
    }

    .animal-btn:hover {
      background: #333;
    }

    /* LIGHTBOX */
    .lightbox {
      position: absolute;
      top: 0;
      left: 0;
      width: 300px;
      height: 300px;
      background: rgba(0,0,0,0.8);

      display: flex;
      justify-content: center;
      align-items: center;

      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .card {
      width: 92%;
      height: 92%;
      background: #000;
      border-radius: 10px;
      overflow-y: auto;
      position: relative;
    }

    /* HEADER */
    .sticky-header {
      position: sticky;
      top: 0;
      background: #000;
      padding: 6px;
      z-index: 2;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-btn {
      cursor: pointer;
      font-size: 14px;
    }

    .profile-img {
      width: 100%;
      max-height: 140px;
      object-fit: contain;
      background: #000;
    }

    .content {
      padding: 8px;
    }

    .species {
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 4px;
    }

    .label {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 4px;
    }

    .text {
      font-size: 11px;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <!-- FILTERS -->
  <div class="filters">
    <button class="active" onclick="filterAnimals('all', this)">All</button>
    <button onclick="filterAnimals('redpanda', this)">Red Pandas</button>
    <button onclick="filterAnimals('seal', this)">Seals</button>
  </div>

  <!-- GRID -->
  <div class="menu" id="menu">

    <!-- RED PANDAS -->
    <button class="animal-btn" data-type="redpanda" onclick="showAnimal('tango')"><img src="assets/red pandas/Tango-profile.jpg">Tango</button>
    <button class="animal-btn" data-type="redpanda" onclick="showAnimal('kiki')"><img src="assets/red pandas/Kiki-profile.jpg">Kiki</button>
    <button class="animal-btn" data-type="redpanda" onclick="showAnimal('fred')"><img src="assets/red pandas/Fred-profile.jpg">Fred</button>
    <button class="animal-btn" data-type="redpanda" onclick="showAnimal('george')"><img src="assets/red pandas/George-profile.jpg">George</button>

    <!-- SEALS -->
    <button class="animal-btn" data-type="seal" onclick="showAnimal('hula')"><img src="assets/seals/Hula-profile.jpg">Hula</button>
    <button class="animal-btn" data-type="seal" onclick="showAnimal('sushi')"><img src="assets/seals/Sushi-profile.jpg">Sushi</button>
    <button class="animal-btn" data-type="seal" onclick="showAnimal('wasabi')"><img src="assets/seals/Wasabi-profile.jpg">Wasabi</button>
    <button class="animal-btn" data-type="seal" onclick="showAnimal('sophia')"><img src="assets/seals/Sophia-profile.jpg">Sophia</button>
    <button class="animal-btn" data-type="seal" onclick="showAnimal('mischa')"><img src="assets/seals/Mischa-profile.jpg">Mischa</button>
    <button class="animal-btn" data-type="seal" onclick="showAnimal('isadora')"><img src="assets/seals/Isadora-profile.jpg">Isadora</button>
    <button class="animal-btn" data-type="seal" onclick="showAnimal('nika')"><img src="assets/seals/Nika-profile.jpg">Nika</button>

  </div>

</div>

<!-- PROFILE VIEW -->
<div class="lightbox" id="lightbox" onclick="hideCard()">

  <div class="card" onclick="event.stopPropagation()">

    <div class="sticky-header">
      <div id="name"></div>
      <div class="close-btn" onclick="hideCard()">✕</div>
    </div>

    <img id="profileImage" class="profile-img">

    <div class="content">

      <div id="species" class="species"></div>

      <div class="label">Sex</div>
      <div id="sex" class="text"></div>

      <div class="label">Age</div>
      <div id="age" class="text"></div>

      <div class="label">Birthday</div>
      <div id="birthday" class="text"></div>

      <div class="label">Arrived</div>
      <div id="arrived" class="text"></div>

      <div class="label">About</div>
      <div id="about" class="text"></div>

      <div class="label">Identifiers</div>
      <div id="identifiers" class="text"></div>

      <div class="label">IUCN Status</div>
      <div id="status" class="text"></div>

      <div class="label">Conservation</div>
      <div id="conservation" class="text"></div>

    </div>

  </div>
</div>

<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
<script src="js/panel.js"></script>

<script>
function filterAnimals(type, btn) {
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.menu button').forEach(item => {
    if (type === 'all' || item.dataset.type === type) {
      item.style.display = 'block';
    } else {
      item.style.display = 'none';
    }
  });
}
</script>

</body>
</html>
